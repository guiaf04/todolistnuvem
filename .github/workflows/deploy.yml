name: Deploy da Aplicação To-Do (Parte 04)

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: constrói a imagem e executa os testes; só em caso de sucesso libera o deploy
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem Docker (validação do Dockerfile)
        run: docker build -t todo-app:ci .

      - name: Executar testes dentro do contêiner
        run: |
          # Monta o diretório da prática no contêiner e tenta rodar testes.
          # Se pytest não estiver instalado, tenta instalar rapidamente no runtime do contêiner.
          docker run --rm \
            -v "$PWD/parte_04":/app \
            -w /app \
            todo-app:ci \
            sh -euc '
              python -m pip install -q pytest || true;
              if [ -d tests ] || ls -1 test_*.py *_test.py >/dev/null 2>&1; then
                pytest -q;
              else
                echo "Nenhum teste encontrado; realizando smoke check";
                python -m compileall -q app;
              fi
            '

  # Job 2: deploy — depende do build-and-test
  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar a chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copiar o código para a EC2 (sem apagar .env)
        run: |
          # Copia APENAS o conteúdo de parte_04/ para o destino correspondente
          # e protege o arquivo .env já existente no servidor (gerado via Ansible/Vault).
          # O uso de filtros 'protect' (P) garante que .env não seja removido pelo --delete.
          rsync -avz --delete \
            --exclude='.git' \
            --filter='P .env' \
            --filter='P */.env' \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/todo-app/"

      - name: Construir a imagem e recarregar a aplicação
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "cd ~/todo-app/parte_04 && docker compose up -d --build"
