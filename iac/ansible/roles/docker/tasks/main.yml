---
- name: Remover docker.list inválido se existir (antes de qualquer apt)
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/docker.list
    state: absent
  become: true

- name: Atualizar cache do apt
  ansible.builtin.apt:
    update_cache: yes
  become: true

- name: Instalar dependências para repositório Docker
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
  become: true

- name: Adicionar chave GPG oficial do Docker
  ansible.builtin.shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
  become: true

- name: Adicionar repositório Docker (Ubuntu)
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present
    update_cache: yes
  become: true

- name: Atualizar cache do apt após adicionar Docker repo
  ansible.builtin.apt:
    update_cache: yes
  become: true

- name: Instalar Docker Engine e Compose Plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  become: true

- name: Adicionar usuário ubuntu ao grupo docker
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: yes
  become: true

- name: Criar diretório da aplicação no remoto
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'
  become: true

- name: Copiar arquivos da aplicação (Dockerfile, compose, requirements, wsgi)
  ansible.builtin.copy:
    src: "{{ project_root }}/{{ item }}"
    dest: "{{ app_dir }}/{{ item | basename }}"
    owner: ubuntu
    group: ubuntu
    mode: '0644'
  loop:
    - Dockerfile
    - docker-compose.yml
    - requirements.txt
    - wsgi.py
  become: true

- name: Copiar diretório app/
  ansible.builtin.copy:
    src: "{{ project_root }}/app"
    dest: "{{ app_dir }}/"
    owner: ubuntu
    group: ubuntu
    mode: '0755'
  become: true

- name: Gerar arquivo .env a partir de template e variáveis Vault
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: ubuntu
    group: ubuntu
    mode: '0600'
  become: true

- name: Subir containers com Docker Compose (build + up -d)
  ansible.builtin.shell: |
    docker compose -f {{ app_dir }}/docker-compose.yml up -d --build
  args:
    chdir: "{{ app_dir }}"
  become: true
